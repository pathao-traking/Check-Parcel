<!DOCTYPE html>
<html>
<head>
<style>
  body { font-family: sans-serif; background-color: #f4f4f4; padding: 20px; }
  .box { background: white; border: 1px solid #ddd; padding: 15px; border-radius: 8px; max-width: 400px; margin: auto; }
  .header { color: #e63946; font-weight: bold; border-bottom: 2px solid #e63946; margin-bottom: 10px; }
  .row { margin-bottom: 8px; border-bottom: 1px dotted #eee; padding-bottom: 5px; }
  .label { font-size: 12px; color: #666; }
  .value { font-size: 15px; font-weight: bold; color: #333; }
</style>
</head>
<body>
  <div class="box">
    <div class="header">STEADFAST COURIER - TRACKING</div>
    <div class="row">
        <div class="label">Consignment ID:</div>
        <div class="value">SF-992031-PRANK</div>
    </div>
    <div class="row">
        <div class="label">Receiver Name:</div>
        <div class="value">Nuha Begum</div>
    </div>
    <div class="row">
        <div class="label">Address:</div>
        <div class="value">ponchoboti,rajshahi</div>
    </div>
    <div class="row">
        <div class="label">Phone:</div>
        <div class="value">01643787554</div>
    </div>
    <div class="row">
        <div class="label">Status:</div>
        <div class="value" style="color: green;">In Transit (On the Way)</div>
    </div>
  </div>
</body>
</html>
